{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900">音声アップロード</h1>
        <a href="/transcription" class="text-gray-600 hover:text-gray-900">
            &larr; 戻る
        </a>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/transcription/upload" enctype="multipart/form-data" class="card space-y-6">
        <input type="hidden" name="csrf_token" value="{{ generate_csrf_token() }}">
        <div>
            <label for="file" class="label">音声ファイル</label>
            <div
                id="drop-zone"
                class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg hover:border-primary-400 transition-colors cursor-pointer"
            >
                <div class="space-y-1 text-center">
                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <div class="flex text-sm text-gray-600">
                        <label for="file" class="relative cursor-pointer rounded-md font-medium text-primary-600 hover:text-primary-500">
                            <span>ファイルを選択</span>
                            <input id="file" name="file" type="file" class="sr-only" accept="audio/*" required>
                        </label>
                        <p class="pl-1">またはドラッグ＆ドロップ</p>
                    </div>
                    <p class="text-xs text-gray-500">MP3, WAV, M4A, FLAC, OGG（最大500MB）</p>
                    <p id="file-name" class="text-sm font-medium text-primary-600 hidden"></p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="engine" class="label">文字起こしエンジン</label>
                <select id="engine" name="engine" class="input">
                    <option value="faster_whisper">Faster Whisper</option>
                    <option value="whisper">OpenAI Whisper</option>
                    <option value="qwen_asr">Qwen ASR</option>
                </select>
            </div>

            <div>
                <label for="model_size" class="label">モデルサイズ</label>
                <select id="model_size" name="model_size" class="input">
                    <option value="tiny">Tiny（最速）</option>
                    <option value="base">Base</option>
                    <option value="small">Small</option>
                    <option value="medium" selected>Medium</option>
                    <option value="large">Large（高品質）</option>
                </select>
            </div>
        </div>

        <div>
            <label for="language" class="label">言語（任意）</label>
            <select id="language" name="language" class="input">
                <option value="">自動検出</option>
                <option value="ja">日本語</option>
                <option value="en">英語</option>
                <option value="zh">中国語</option>
                <option value="ko">韓国語</option>
            </select>
            <p class="text-xs text-gray-500 mt-1">空欄にすると自動で言語を検出します</p>
        </div>

        <div class="flex justify-end">
            <button type="submit" class="btn btn-primary" id="submit-btn">
                アップロード＆文字起こし
            </button>
        </div>
    </form>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file');
    const fileName = document.getElementById('file-name');

    // Click to upload
    dropZone.addEventListener('click', () => fileInput.click());

    // Show selected file name
    fileInput.addEventListener('change', function() {
        if (this.files.length > 0) {
            fileName.textContent = this.files[0].name;
            fileName.classList.remove('hidden');
        }
    });

    // Drag and drop
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('border-primary-500', 'bg-primary-50');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('border-primary-500', 'bg-primary-50');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-primary-500', 'bg-primary-50');

        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            fileName.textContent = e.dataTransfer.files[0].name;
            fileName.classList.remove('hidden');
        }
    });
});
</script>
{% endblock %}
