{% extends "base.html" %}

{% block content %}
<div class="text-center py-12">
    <h1 class="text-4xl font-bold text-gray-900 mb-12">
        Mojiokoshi
    </h1>

    <div class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
        <div class="card hover:shadow-lg transition-shadow">
            <div class="text-primary-600 mb-4">
                <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                </svg>
            </div>
            <h2 class="text-xl font-semibold text-gray-900 mb-2">音声録音</h2>
            <p class="text-gray-600 mb-4">
                ブラウザから直接録音し、リアルタイムで文字起こしを行います。
            </p>
            <a href="/transcription/record" class="btn btn-primary inline-block">
                録音を開始
            </a>
        </div>

        <div class="card hover:shadow-lg transition-shadow">
            <div class="text-primary-600 mb-4">
                <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
            </div>
            <h2 class="text-xl font-semibold text-gray-900 mb-2">ファイルアップロード</h2>
            <p class="text-gray-600 mb-4">
                音声ファイルをアップロードして文字起こしと要約を行います。
            </p>
            <a href="/transcription/upload" class="btn btn-primary inline-block">
                音声をアップロード
            </a>
        </div>
    </div>
</div>
{% endblock %}
