{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="card text-center">
        <div class="text-green-600 mb-4">
            <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-2">ユーザーを作成しました</h1>
        <p class="text-gray-600 mb-6">以下の認証情報を保存してください：</p>

        <div class="bg-gray-50 rounded-lg p-6 mb-6">
            <div class="grid grid-cols-2 gap-4 text-left">
                <div>
                    <p class="text-sm text-gray-500">ユーザーID</p>
                    <p class="font-mono text-2xl font-bold text-gray-900">{{ user.user_id }}</p>
                </div>
                <div>
                    <p class="text-sm text-gray-500">表示名</p>
                    <p class="text-lg text-gray-900">{{ user.display_name }}</p>
                </div>
                <div>
                    <p class="text-sm text-gray-500">権限</p>
                    <p class="text-lg text-gray-900 capitalize">{{ user.role.value }}</p>
                </div>
            </div>
        </div>

        <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 px-4 py-3 rounded-lg mb-6 text-sm text-left">
            <strong>重要：</strong> ユーザーIDと初期パスワードを必ずユーザーに伝えてください。ユーザーIDは変更できません。
        </div>

        <div class="flex justify-center space-x-4">
            <a href="/admin/users/new" class="btn btn-secondary">
                別のユーザーを追加
            </a>
            <a href="/admin/users" class="btn btn-primary">
                ユーザー一覧に戻る
            </a>
        </div>
    </div>
</div>
{% endblock %}
