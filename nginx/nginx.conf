# ============================================================
# メインアプリ（文字起こし・要約）
# ============================================================

server {
    listen 80;
    server_name _;
    # HTTP → HTTPS リダイレクト
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 音声ファイルアップロード上限（500MB）
    client_max_body_size 500m;

    # Docker 内蔵 DNS を使い、upstream の IP を毎回解決し直す
    resolver 127.0.0.11 valid=30s;
    set $web_upstream http://web:8000;

    # 通常リクエスト
    location / {
        proxy_pass         $web_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket（録音用）
    location /ws {
        proxy_pass         $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }
}

# ============================================================
# チェッカーデモアプリ（リアルタイム文字起こしチェッカー）
# マイク使用のため HTTPS が必要 → 別ポートで提供
# ============================================================

server {
    listen 8444 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    resolver 127.0.0.11 valid=30s;
    set $checker_upstream http://checker:8001;

    # チェッカー UI
    location / {
        proxy_pass         $checker_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket（PCM ストリーミング用）
    location /ws {
        proxy_pass         $checker_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }
}
