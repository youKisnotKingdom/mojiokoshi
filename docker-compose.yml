version: "3.8"

services:
  # Main web application
  web:
    build: .
    image: mojiokoshi:latest
    container_name: mojiokoshi-web
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://mojiokoshi:${POSTGRES_PASSWORD:-mojiokoshi}@db:5432/mojiokoshi
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - UPLOAD_DIR=/app/uploads
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-http://host.docker.internal:8080/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-default}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-medium}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-ja}
      - AUDIO_RETENTION_DAYS=${AUDIO_RETENTION_DAYS:-30}
      - ADMIN_USER_ID=${ADMIN_USER_ID:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    volumes:
      - uploads:/app/uploads
      - models:/app/models   # Whisper モデルキャッシュ
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Background worker for transcription and summarization
  worker:
    build: .
    image: mojiokoshi:latest
    container_name: mojiokoshi-worker
    command: python -m app.services.worker
    environment:
      - DATABASE_URL=postgresql://mojiokoshi:${POSTGRES_PASSWORD:-mojiokoshi}@db:5432/mojiokoshi
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required.}
      - UPLOAD_DIR=/app/uploads
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-http://host.docker.internal:8080/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-default}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-medium}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-ja}
      - LD_LIBRARY_PATH=/usr/local/lib/ollama/cuda_v12
    volumes:
      - uploads:/app/uploads
      - models:/app/models   # web と同じモデルボリュームを共有
      - /usr/local/lib/ollama/cuda_v12:/usr/local/lib/ollama/cuda_v12:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Real-time transcription checker demo
  checker:
    build: .
    image: mojiokoshi:latest
    container_name: mojiokoshi-checker
    entrypoint: []
    command: uvicorn demo.checker:app --host 0.0.0.0 --port 8001 --log-level info
    ports:
      - "${CHECKER_PORT:-8001}:8001"
    environment:
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-http://host.docker.internal:8080/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-default}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-medium}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-ja}
      - HF_HOME=/app/models
      - LD_LIBRARY_PATH=/usr/local/lib/ollama/cuda_v12
    volumes:
      - models:/app/models
      - /usr/local/lib/ollama/cuda_v12:/usr/local/lib/ollama/cuda_v12:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: mojiokoshi-db
    environment:
      - POSTGRES_USER=mojiokoshi
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mojiokoshi}
      - POSTGRES_DB=mojiokoshi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mojiokoshi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  uploads:
  postgres_data:
  models:   # Whisper モデルファイル（インターネット環境で事前ダウンロード）
