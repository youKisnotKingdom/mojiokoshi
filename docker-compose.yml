services:
  # Main web application
  web:
    build: .
    image: mojiokoshi:latest
    container_name: mojiokoshi-web
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - TZ=Asia/Tokyo
      - DATABASE_URL=postgresql://mojiokoshi:${POSTGRES_PASSWORD:-mojiokoshi}@db:5432/mojiokoshi
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-}
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-1073741824}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:?LLM_API_BASE_URL is required}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-default}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-medium}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-ja}
      - AUDIO_RETENTION_DAYS=${AUDIO_RETENTION_DAYS:-30}
      - ADMIN_USER_ID=${ADMIN_USER_ID:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    volumes:
      - uploads:/app/uploads
      - models:/app/models   # Whisper モデルキャッシュ
    depends_on:
      db:
        condition: service_healthy
    gpus: all
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Background worker for transcription and summarization
  worker:
    build: .
    image: mojiokoshi:latest
    container_name: mojiokoshi-worker
    entrypoint: ["scripts/worker_entrypoint.sh"]
    command: python -m app.services.worker
    environment:
      - TZ=Asia/Tokyo
      - DATABASE_URL=postgresql://mojiokoshi:${POSTGRES_PASSWORD:-mojiokoshi}@db:5432/mojiokoshi
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required.}
      - UPLOAD_DIR=/app/uploads
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:?LLM_API_BASE_URL is required}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-default}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-medium}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-ja}
    volumes:
      - uploads:/app/uploads
      - models:/app/models   # web と同じモデルボリュームを共有
    depends_on:
      db:
        condition: service_healthy
    gpus: all
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Real-time transcription checker demo
  checker:
    build: .
    image: mojiokoshi:latest
    container_name: mojiokoshi-checker
    entrypoint: []
    command: uvicorn demo.checker:app --host 0.0.0.0 --port 8001 --log-level info
    ports:
      - "${CHECKER_PORT:-8001}:8001"
    environment:
      - TZ=Asia/Tokyo
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:?LLM_API_BASE_URL is required}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-default}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-medium}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-ja}
      - HF_HOME=/app/models
    volumes:
      - models:/app/models
    gpus: all
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: mojiokoshi-db
    environment:
      - POSTGRES_USER=mojiokoshi
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mojiokoshi}
      - POSTGRES_DB=mojiokoshi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mojiokoshi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  uploads:
  postgres_data:
  models:   # Whisper モデルファイル（インターネット環境で事前ダウンロード）
